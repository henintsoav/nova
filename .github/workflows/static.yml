name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DISCORD_WEBHOOK_LOL:       ${{ secrets.DISCORD_WEBHOOK_LOL }}
          VITE_DISCORD_WEBHOOK_WR:        ${{ secrets.DISCORD_WEBHOOK_WR }}
          VITE_DISCORD_WEBHOOK_VALO:      ${{ secrets.DISCORD_WEBHOOK_VALO }}
          VITE_DISCORD_WEBHOOK_PLANNING_LOL:   ${{ secrets.DISCORD_WEBHOOK_PLANNING_LOL }}
          VITE_DISCORD_WEBHOOK_PLANNING_WR:    ${{ secrets.DISCORD_WEBHOOK_PLANNING_WR }}
          VITE_DISCORD_WEBHOOK_PLANNING_VALO:  ${{ secrets.DISCORD_WEBHOOK_PLANNING_VALO }}
          VITE_DISCORD_WEBHOOK_PROPOSALS_LOL:  ${{ secrets.DISCORD_WEBHOOK_PROPOSALS_LOL }}
          VITE_DISCORD_WEBHOOK_PROPOSALS_WR:   ${{ secrets.DISCORD_WEBHOOK_PROPOSALS_WR }}
          VITE_DISCORD_WEBHOOK_PROPOSALS_VALO: ${{ secrets.DISCORD_WEBHOOK_PROPOSALS_VALO }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
